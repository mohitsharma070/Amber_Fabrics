<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Outer white circle with subtle stroke -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.95"/>
  
  <!-- Inner accent circle -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#14b8a6" stroke-width="3" opacity="0.8"/>
  
  <!-- Textile pattern in white -->
  <g fill="#ffffff" opacity="0.9">
    <!-- Vertical threads -->
    <rect x="32" y="35" width="3.5" height="50" rx="1.5"/>
    <rect x="44" y="35" width="3.5" height="50" rx="1.5"/>
    <rect x="56" y="35" width="3.5" height="50" rx="1.5"/>
    <rect x="68" y="35" width="3.5" height="50" rx="1.5"/>
    <rect x="80" y="35" width="3.5" height="50" rx="1.5"/>
    
    <!-- Horizontal threads -->
    <rect x="28" y="40" width="60" height="3" rx="1.5" opacity="0.7"/>
    <rect x="28" y="53" width="60" height="3" rx="1.5" opacity="0.7"/>
    <rect x="28" y="66" width="60" height="3" rx="1.5" opacity="0.7"/>
    <rect x="28" y="79" width="60" height="3" rx="1.5" opacity="0.7"/>
  </g>
  
  <!-- Large prominent V -->
  <text x="60" y="80" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="1">V</text>
  
  <!-- Accent teal highlight on V -->
  <text x="60" y="80" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#14b8a6" text-anchor="middle" opacity="0.3">V</text>
</svg>
